<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TA-NDA Tracker v4.1</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="./my-icon.png">

    <style>
        :root { --bg: #f4f6f8; --card: #ffffff; --border: #cbd5e1; --text: #1e293b; --blue: #1e40af; --green: #10b981; --red: #ef4444; }
        * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 0; font-size: 15px; }
        .hidden { display: none !important; }
        .top-bar { background: #0f172a; color: white; padding: 20px; display: flex; justify-content: center; align-items: center; position: sticky; top: 0; z-index: 1000; height: 80px; }
        .top-bar-content { width: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
        .top-bar h1 { margin: 0; font-size: 18px; font-weight: 800; color: #fde047; letter-spacing: 1px; }
        .back-btn { background: transparent; border: none; color: white; font-size: 16px; cursor: pointer; position: absolute; left: 0; }
        .version-badge { position: absolute; right: 0; background: rgba(255,255,255,0.2); padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .screen-content { padding: 15px; padding-bottom: 80px; max-width: 600px; margin: 0 auto; }
        .card { background: var(--card); border: 2px solid var(--border); border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; margin-top: 4px; font-weight: bold; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; background: var(--blue); }
    </style>
</head>
<body>

<div id="ui-wrapper">
    <div id="screen-dashboard">
        <div class="top-bar"><div class="top-bar-content"><h1>TA-NDA TRACKER</h1><div class="version-badge">v4.1</div></div></div>
        <div class="screen-content">
            <div class="card" style="border: 3px solid #6366f1;">
                <h3 style="color:#1e40af;">Duty Status</h3>
                <p id="duty-status-desc">Ready to log.</p>
                <button onclick="navTo('screen-add')" style="background:#4f46e5;">+ Add Journey</button>
                <div id="recent-logs-dash" style="margin-top:15px;"></div>
            </div>
            <div class="card" style="border: 2px solid #a855f7;">
                <div class="grid-2">
                    <div class="nav-card" onclick="navTo('screen-all')">📋 ALL ENTRIES</div>
                    <div class="nav-card" onclick="navTo('screen-reports')">🖨️ GENERATE PDF</div>
                    <div class="nav-card" onclick="openSettings()">👤 PROFILE SETUP</div>
                    <div class="nav-card" onclick="navTo('screen-backup')">💾 BACKUP DATA</div>
                </div>
            </div>
            <div class="card" style="border: 2px solid #f59e0b;">
                <h3 style="color:#b45309;">Help & Feedback</h3>
                <button onclick="window.open('YOUR_GOOGLE_FORM_URL', '_blank')" style="background:#f59e0b; margin-bottom:10px;">Submit Feedback / Suggestions</button>
                <button onclick="window.location.href='mailto:ksanjeev.nit@gmail.com'" style="background:#64748b;">Contact Me (Email)</button>
            </div>
        </div>
    </div>

    <div id="screen-add" class="hidden">
        <div class="top-bar"><button class="back-btn" onclick="navTo('screen-dashboard')">← Back</button><h1>ADD JOURNEY</h1></div>
        <div class="screen-content">
            <div style="background: #eef2ff; border: 2px solid #818cf8; border-radius: 8px; padding: 15px;">
                <label>Train No.</label><input type="text" id="trip-train">
                <div style="display:flex; gap:10px;">
                    <div style="flex:1;">
                        <label>Dep. Date</label><input type="date" id="trip-dep-date">
                        <label>Station From</label><input list="stn-list" id="trip-dep-stn">
                        <label>Dep. Time (HHMM)</label><input type="text" id="trip-dep-time" placeholder="e.g. 0925" maxlength="4">
                    </div>
                    <div style="flex:1;">
                        <label>Arr. Date</label><input type="date" id="trip-arr-date">
                        <label>Station To</label><input list="stn-list" id="trip-arr-stn">
                        <label>Arr. Time (HHMM)</label><input type="text" id="trip-arr-time" placeholder="e.g. 1430" maxlength="4">
                    </div>
                </div>
            </div>
            <button onclick="saveLeg()" style="margin-top:15px;">Save Leg Entry</button>
            <div id="recent-logs-add" style="margin-top:15px; border: 1px solid #ccc;"></div>
        </div>
    </div>

    <div id="screen-all" class="hidden">
        <div class="top-bar"><button class="back-btn" onclick="navTo('screen-dashboard')">← Back</button><h1>ALL ENTRIES</h1></div>
        <div class="screen-content">
            <div style="background:#334155; padding:10px; display:flex; gap:5px;">
                <select id="all-logs-month" onchange="renderAllLogs()"></select>
                <select id="all-logs-year" onchange="renderAllLogs()"></select>
            </div>
            <div id="all-logs-container"></div>
            <p style="color: #64748b; font-size:12px;">🔵 Upward Leg | 🟢 Downward Leg</p>
        </div>
    </div>

    <div id="screen-register" class="hidden">
        <div class="top-bar"><button class="back-btn" id="profile-back-btn" onclick="navTo('screen-dashboard')">← Back</button><h1>PROFILE</h1></div>
        <div class="screen-content">
            <div style="background:#fef3c7; padding:10px; font-size:12px;">Fill data carefully for PDF bills.<br>डेटा ध्यान से भरें।</div>
            <input type="text" id="reg-name" placeholder="Full Name">
            <div style="display:flex; gap:10px;">
                <input type="text" id="reg-pf" placeholder="P.F. No."><input type="text" id="reg-bu" placeholder="Bill Unit No.">
            </div>
            <div style="display:flex; gap:10px;">
                <select id="reg-emp-type" onchange="checkGazetted()"><option value="Non-Gazetted">Non-Gazetted</option><option value="Gazetted">Gazetted</option></select>
                <select id="reg-payscale">
                    <option value="LEVEL-1">LEVEL-1</option><option value="LEVEL-2">LEVEL-2</option>
                    <option value="LEVEL-3">LEVEL-3</option><option value="LEVEL-4">LEVEL-4</option>
                    <option value="LEVEL-5">LEVEL-5</option><option value="LEVEL-6">LEVEL-6</option>
                    <option value="LEVEL-7">LEVEL-7</option><option value="LEVEL-8">LEVEL-8</option>
                </select>
            </div>
            <div style="display:flex; gap:10px;">
                <input type="number" id="reg-gradepay" placeholder="Grade Pay"><input type="number" id="reg-basicpay" placeholder="Basic Pay">
            </div>
            <div style="display:flex; gap:10px;">
                <input type="number" id="reg-tarate" placeholder="TA Rate"><input type="number" id="reg-da" placeholder="DA %">
            </div>
            <button onclick="saveProfile()">Save & Lock</button>
            <button onclick="window.logout()" style="background:#475569;">Sign Out</button>
        </div>
    </div>

    <div id="screen-backup" class="hidden">
        <div class="top-bar"><button class="back-btn" onclick="navTo('screen-dashboard')">← Back</button><h1>BACKUP</h1></div>
        <div class="screen-content">
            <button onclick="exportData()" style="margin-bottom:10px;">Download Backup</button>
            <button onclick="document.getElementById('import-file').click()" style="background:#f59e0b;">Restore from File</button>
            <input type="file" id="import-file" class="hidden" onchange="importData(event)">
            <div class="card" style="border: 2px solid #10b981; margin-top:20px;"><h3>Cloud Sync Status</h3><p id="sync-time-lbl">Last Synced: Never</p></div>
        </div>
    </div>
</div>

<script>
    // [The core logic remains the same as v4.0, integrated with your requested field changes]
    // Note: I have updated the NDA calculation in this v4.1 build as requested:
    // const unitHours = Math.floor(totalEligibleHours / 6);
    // ndaAmt = unitHours * hourlyRate;
    
    // Add this to your JS for time formatting:
    document.getElementById('trip-dep-time').oninput = function() {
        let v = this.value.replace(/\D/g, '');
        if(v.length > 2) this.value = v.slice(0,2) + ':' + v.slice(2,4);
    };
    
    function checkGazetted() {
        if (document.getElementById('reg-emp-type').value === 'Gazetted') {
            showModal("NOTICE", "NDA is only paid to eligible non-gazetted employees up to Pay Level-7. This includes those who have reached Pay Level-8 through MACP.", "warning", false);
        }
    }
</script>
</body>
</html>
